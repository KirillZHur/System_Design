services:
  postgres:
    image: postgres:16
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:5.0
    container_name: lms_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 }).ok' | mongosh localhost:27017/test --quiet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: lms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: lms_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lms_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://host.docker.internal:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  lms-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms_service
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: on-failure:5
    command: ["/app/lms_service", "--config", "/app/configs/static_config.yaml", "--config_vars", "/app/configs/config_vars.yaml"]

  course-command-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms_course_command_service
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "8090:8090"
    restart: on-failure:5
    command: ["/app/course_command_service", "--config", "/app/configs/static_config.command.yaml", "--config_vars", "/app/configs/config_vars.command.yaml"]

  course-consumer-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms_course_consumer_service
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8091:8091"
    restart: on-failure:5
    command: ["/app/course_consumer_service", "--config", "/app/configs/static_config.consumer.yaml", "--config_vars", "/app/configs/config_vars.consumer.yaml"]

volumes:
  postgres_data:
  mongo_data: