openapi: 3.0.3
info:
  title: LMS Service API
  version: 1.0.0
  description: |
    REST API сервиса LMS, реализованного на C++ и Yandex Userver.
    API поддерживает регистрацию и аутентификацию пользователей,
    работу с курсами, уроками, записями на курсы и прогрессом.

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Регистрация и аутентификация
  - name: Users
    description: Операции с пользователями
  - name: Courses
    description: Операции с курсами
  - name: Lessons
    description: Операции с уроками
  - name: Enrollments
    description: Запись пользователей на курсы
  - name: Progress
    description: Прогресс по урокам
  - name: Service
    description: Служебные endpoint’ы

paths:
  /ping:
    get:
      tags: [Service]
      summary: Проверка доступности сервиса
      responses:
        '200':
          description: Сервис доступен

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: teacher1
              password: pass123
              first_name: Иван
              last_name: Петров
              role: teacher
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                id: 3
                login: teacher1
                first_name: Иван
                last_name: Петров
                role: teacher
                status: registered
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Fields login, password, first_name, last_name, role are required
        '409':
          description: Пользователь с таким логином уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: User with this login already exists
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: teacher1
              password: pass123
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: <JWT_TOKEN>
                token_type: Bearer
                login: teacher1
                role: teacher
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Fields login and password are required
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid login or password
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/users/by-login/{login}:
    get:
      tags: [Users]
      summary: Получить пользователя по логину
      security:
        - bearerAuth: []
      parameters:
        - name: login
          in: path
          required: true
          schema:
            type: string
          example: teacher1
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 3
                login: teacher1
                first_name: Иван
                last_name: Петров
                role: teacher
        '400':
          description: Некорректный login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: login is required
        '401':
          description: Требуется аутентификация / невалидный JWT
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: User not found
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/users/search:
    get:
      tags: [Users]
      summary: Поиск пользователей
      security:
        - bearerAuth: []
      parameters:
        - name: first_name
          in: query
          required: false
          schema:
            type: string
          example: Анна
        - name: last_name
          in: query
          required: false
          schema:
            type: string
          example: Иванова
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
              example:
                - id: 4
                  login: student1
                  first_name: Анна
                  last_name: Иванова
                  role: student
        '400':
          description: Некорректные параметры запроса
        '401':
          description: Требуется аутентификация / невалидный JWT
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/courses:
    post:
      tags: [Courses]
      summary: Создание курса
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
            example:
              title: C++ Basics
              description: Введение в C++
              teacher_id: 1
      responses:
        '201':
          description: Курс успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
              example:
                id: 2
                title: C++ Basics
                description: Введение в C++
                teacher_id: 1
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Fields title, description, teacher_id are required
        '401':
          description: Требуется аутентификация / невалидный JWT
        '403':
          description: Доступ запрещён
        '404':
          description: Преподаватель не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Teacher not found
        '500':
          description: Внутренняя ошибка сервера

    get:
      tags: [Courses]
      summary: Получение списка курсов
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список курсов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseResponse'
              example:
                - id: 2
                  title: C++ Basics
                  description: Введение в C++
                  teacher_id: 1
                - id: 1
                  title: C++ Basics
                  description: Intro course
                  teacher_id: 1
        '401':
          description: Требуется аутентификация / невалидный JWT
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/courses/{course_id}/lessons:
    post:
      tags: [Lessons]
      summary: Добавление урока в курс
      security:
        - bearerAuth: []
      parameters:
        - name: course_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLessonRequest'
            example:
              title: Lesson 1
              content: Переменные и типы данных
      responses:
        '201':
          description: Урок успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonResponse'
              example:
                id: 2
                course_id: 1
                title: Lesson 1
                content: Переменные и типы данных
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Fields title and content are required
        '401':
          description: Требуется аутентификация / невалидный JWT
        '403':
          description: Доступ запрещён
        '404':
          description: Курс не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Course not found
        '500':
          description: Внутренняя ошибка сервера

    get:
      tags: [Lessons]
      summary: Получение списка уроков курса
      security:
        - bearerAuth: []
      parameters:
        - name: course_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Список уроков курса
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonResponse'
              example:
                - id: 1
                  course_id: 1
                  title: Lesson 1
                  content: Variables and types
                - id: 2
                  course_id: 1
                  title: Lesson 1
                  content: Переменные и типы данных
        '401':
          description: Требуется аутентификация / невалидный JWT
        '404':
          description: Курс не найден
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/courses/{course_id}/enrollments:
    post:
      tags: [Enrollments]
      summary: Запись пользователя на курс
      security:
        - bearerAuth: []
      parameters:
        - name: course_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollRequest'
            example:
              user_id: 2
      responses:
        '200':
          description: Пользователь успешно записан на курс
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
              example:
                status: enrolled
                user_id: 2
                course_id: 1
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Field user_id is required
        '401':
          description: Требуется аутентификация / невалидный JWT
        '403':
          description: Доступ запрещён
        '404':
          description: Пользователь или курс не найден
        '409':
          description: Пользователь уже записан на курс
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: User already enrolled
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/users/{user_id}/courses:
    get:
      tags: [Enrollments]
      summary: Получение курсов пользователя
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: Список курсов пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseResponse'
              example:
                - id: 1
                  title: C++ Basics
                  description: Intro course
                  teacher_id: 1
        '401':
          description: Требуется аутентификация / невалидный JWT
        '404':
          description: Пользователь не найден
        '500':
          description: Внутренняя ошибка сервера

  /api/v1/lessons/{lesson_id}/progress:
    post:
      tags: [Progress]
      summary: Отметка урока как завершённого
      security:
        - bearerAuth: []
      parameters:
        - name: lesson_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgressRequest'
            example:
              user_id: 2
              completed: true
      responses:
        '200':
          description: Прогресс успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressResponse'
              example:
                status: completed
                user_id: 2
                lesson_id: 1
                completed: true
        '400':
          description: Некорректные входные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Fields user_id and completed=true are required
        '401':
          description: Требуется аутентификация / невалидный JWT
        '403':
          description: Доступ запрещён
        '404':
          description: Пользователь или урок не найден
        '500':
          description: Внутренняя ошибка сервера

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterRequest:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum: [student, teacher, admin]
      required:
        - login
        - password
        - first_name
        - last_name
        - role

    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
        status:
          type: string
      required:
        - id
        - login
        - first_name
        - last_name
        - role
        - status

    LoginRequest:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
      required:
        - login
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        token_type:
          type: string
        login:
          type: string
        role:
          type: string
      required:
        - token
        - token_type
        - login
        - role

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
      required:
        - id
        - login
        - first_name
        - last_name
        - role

    CreateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        teacher_id:
          type: integer
      required:
        - title
        - description
        - teacher_id

    CourseResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        teacher_id:
          type: integer
      required:
        - id
        - title
        - description
        - teacher_id

    AddLessonRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required:
        - title
        - content

    LessonResponse:
      type: object
      properties:
        id:
          type: integer
        course_id:
          type: integer
        title:
          type: string
        content:
          type: string
      required:
        - id
        - course_id
        - title
        - content

    EnrollRequest:
      type: object
      properties:
        user_id:
          type: integer
      required:
        - user_id

    EnrollmentResponse:
      type: object
      properties:
        status:
          type: string
        user_id:
          type: integer
        course_id:
          type: integer
      required:
        - status
        - user_id
        - course_id

    ProgressRequest:
      type: object
      properties:
        user_id:
          type: integer
        completed:
          type: boolean
      required:
        - user_id
        - completed

    ProgressResponse:
      type: object
      properties:
        status:
          type: string
        user_id:
          type: integer
        lesson_id:
          type: integer
        completed:
          type: boolean
      required:
        - status
        - user_id
        - lesson_id
        - completeds